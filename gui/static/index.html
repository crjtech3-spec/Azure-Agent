<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent VS — Autonomous Coding Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="titlebar">
    <div class="title-left">
      <span class="logo">Agent VS</span>
      <span class="subtitle">Autonomous Coding Agent</span>
    </div>
    <div class="title-right">
      <span id="status-pill" class="pill pill-idle">idle</span>
      <span id="health-pill" class="pill pill-idle">checking…</span>
      <button id="test-conn-btn" class="btn" title="Send a tiny probe to verify endpoint + key + model">Test API</button>
      <button id="open-folder-btn" class="btn" title="Switch the agent's workspace to a folder on disk">Open Folder</button>
      <button id="reset-btn" class="btn btn-ghost" title="Wipe state.json + memory.json">Reset</button>
    </div>
  </div>

  <div id="workbench">
    <!-- Left: Explorer -->
    <aside id="explorer" class="panel">
      <div class="panel-header">
        <span>EXPLORER</span>
        <span class="header-actions">
          <button id="new-file-btn" class="btn btn-icon" title="New file">+</button>
          <button id="refresh-files" class="btn btn-icon" title="Refresh">↻</button>
        </span>
      </div>
      <div class="panel-subheader" id="workspace-path" title="Click 'Open Folder' to change">workspace/</div>
      <div id="new-file-row" class="new-file-row hidden">
        <input id="new-file-input" type="text" placeholder="path/to/file.py" />
        <button id="new-file-create" class="btn btn-primary">Create</button>
        <button id="new-file-cancel" class="btn btn-ghost">×</button>
      </div>
      <ul id="file-tree" class="file-tree"></ul>
    </aside>

    <!-- Middle: Editor -->
    <section id="editor" class="panel">
      <div class="tab-bar">
        <span id="tab-name" class="tab">No file selected</span>
        <span class="spacer"></span>
        <button id="save-file" class="btn" disabled>Save</button>
      </div>
      <textarea id="editor-area" spellcheck="false" placeholder="Select a file from the Explorer…"></textarea>
      <div id="editor-status">—</div>
    </section>

    <!-- Right: Agent chat -->
    <aside id="chat" class="panel">
      <div class="panel-header">
        <span>AGENT CHAT</span>
        <button id="clear-chat" class="btn btn-icon" title="Clear chat">⌫</button>
      </div>

      <div id="plan-block">
        <div class="plan-header">Plan</div>
        <ol id="plan-list" class="plan-list">
          <li class="plan-empty">No plan yet. Send a goal below.</li>
        </ol>
      </div>

      <div id="chat-log" class="chat-log"></div>

      <div id="composer">
        <textarea id="goal-input" rows="3"
          placeholder="Tell the agent what to build, e.g. 'Create a FastAPI app with /health and a pytest for it'"></textarea>
        <div class="composer-row">
          <label class="iter-label">
            iter cap
            <input id="max-iter" type="number" min="1" max="200" value="60" />
          </label>
          <span class="spacer"></span>
          <button id="stop-btn" class="btn btn-danger" disabled>Stop</button>
          <button id="send-btn" class="btn btn-primary">Run</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Open Folder modal -->
  <div id="folder-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <span>Open Folder as Workspace</span>
        <button id="folder-close" class="btn btn-icon" title="Close">×</button>
      </div>
      <div class="modal-body">
        <div class="path-row">
          <input id="folder-path" type="text" placeholder="C:\path\to\folder" />
          <button id="folder-go" class="btn">Go</button>
        </div>
        <div class="folder-shortcuts">
          <button class="chip" data-shortcut="">Drives</button>
          <button class="chip" data-shortcut="~">Home</button>
        </div>
        <ul id="folder-list" class="folder-list">
          <li class="empty">Loading…</li>
        </ul>
      </div>
      <div class="modal-footer">
        <span id="folder-current" class="folder-current"></span>
        <span class="spacer"></span>
        <button id="folder-cancel" class="btn btn-ghost">Cancel</button>
        <button id="folder-open" class="btn btn-primary" disabled>Open this folder</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
